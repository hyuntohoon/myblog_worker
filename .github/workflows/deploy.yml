# .github/workflows/deploy.yml
name: Deploy Worker Lambda

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run tests
        env:
          TEST_DB_URL: ${{ secrets.TEST_DB_URL }}
        run: pytest tests/ -v --alluredir=allure-results

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/

  deploy:
    needs: test # ← test job이 통과해야 deploy 실행
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build zip
        run: |
          mkdir -p build
          pip install -r requirements.txt -t build \
            --platform manylinux2014_aarch64 --only-binary=:all:
          cp -r worker build/
          find build -name "__pycache__" -exec rm -rf {} +
          cd build && zip -r ../bundle.zip .

      - name: Deploy to Lambda
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-2
        run: |
          aws lambda update-function-code \
            --function-name blogWorkerLambda \
            --zip-file fileb://bundle.zip \
            --architectures arm64
