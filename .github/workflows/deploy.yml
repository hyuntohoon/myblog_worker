# .github/workflows/deploy.yml
name: Deploy Worker Lambda

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Least privilege: default GITHUB_TOKEN is too broad; this workflow only needs to read the repo.
permissions:
  contents: read

# Serialize prod deploys so out-of-order pushes can't overwrite a newer Lambda with an older build.
concurrency:
  group: worker-deploy-prod
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure git auth for private package
        env:
          SHARED_DB_PAT: ${{ secrets.SHARED_DB_PAT }}
        run: git config --global url."https://${SHARED_DB_PAT}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run tests
        env:
          TEST_DB_URL: ${{ secrets.TEST_DB_URL }}
          SPOTIFY_CLIENT_ID: "test"
          SPOTIFY_CLIENT_SECRET: "test"
          DRY_RUN: "true"
        run: pytest tests/ -v --alluredir=allure-results

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/

  deploy:
    needs: test
    # Production deploy is main-only. push already filters to main (on.push.branches), but
    # workflow_dispatch can be invoked against ANY ref, so guard the ref explicitly — otherwise
    # a dispatch from a feature branch would ship that branch's code to prod.
    if: >-
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure git auth for private package
        env:
          SHARED_DB_PAT: ${{ secrets.SHARED_DB_PAT }}
        run: git config --global url."https://${SHARED_DB_PAT}@github.com/".insteadOf "https://github.com/"

      - name: Build zip
        run: |
          mkdir -p build
          pip install -r requirements.txt -t build \
            --platform manylinux2014_aarch64 --only-binary=:all:
          cp -r worker build/
          find build -name "__pycache__" -exec rm -rf {} +
          find build -name "*.pyc" -delete
          cd build && zip -r ../bundle.zip .

      - name: Deploy to Lambda
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-2
          FUNCTION_NAME: ${{ vars.LAMBDA_FUNCTION_NAME || 'blogWorkerLambda' }}
        run: |
          aws lambda update-function-code \
            --function-name "$FUNCTION_NAME" \
            --zip-file fileb://bundle.zip \
            --architectures arm64

      # OPS-delivery-safety-gates Step 3 — post-deploy health smoke. The worker has
      # no HTTP surface, so health = wait for the new code to go live, then invoke
      # with an empty event. An empty `{}` matches no job/source/Records branch, so
      # the handler returns {"batchItemFailures": []} as a pure no-op (no DB, no
      # external calls) — a FunctionError here means the deployed bundle fails to
      # import/enter, i.e. roll back. Code is already live, so this is
      # detect-and-alert-fast + rollback trigger, not a pre-cutover gate.
      - name: Post-deploy smoke (health invoke)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-2
          FUNCTION_NAME: ${{ vars.LAMBDA_FUNCTION_NAME || 'blogWorkerLambda' }}
        run: |
          # function-updated-v2 polls GetFunction (already granted to the deploy
          # user); the v1 waiter polls GetFunctionConfiguration, which the
          # least-privilege lambda-deploy-only policy does not allow.
          aws lambda wait function-updated-v2 --function-name "$FUNCTION_NAME"
          aws lambda invoke \
            --function-name "$FUNCTION_NAME" \
            --cli-binary-format raw-in-base64-out \
            --payload '{}' \
            /tmp/worker-out.json > /tmp/worker-invoke.json
          echo "invoke metadata:"; cat /tmp/worker-invoke.json; echo
          echo "payload response:"; cat /tmp/worker-out.json; echo
          if grep -q '"FunctionError"' /tmp/worker-invoke.json; then
            echo "::error::Worker health invoke returned a FunctionError — the deployed bundle is broken (import/entry failure). Roll back the deploy."
            exit 1
          fi
          echo "Worker health OK (empty-event invoke, no FunctionError)."
